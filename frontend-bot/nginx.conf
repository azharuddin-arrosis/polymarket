server {
    listen 80; server_name _; root /usr/share/nginx/html; index index.html;
    gzip on; gzip_types text/plain text/css application/javascript application/json;
    location / { try_files $uri $uri/ /index.html; add_header Cache-Control "no-cache"; }
    location ~* \.(js|css|ico|woff2?)$ { expires 1y; add_header Cache-Control "public, immutable"; }
    location /api/ { proxy_pass http://${BACKEND_HOST}:8000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 30s; }
    location /ws { proxy_pass http://${BACKEND_HOST}:8000/ws; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "Upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400s; }
}
