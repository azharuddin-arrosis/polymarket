server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Docker embedded DNS — lazy resolution via variables (won't crash if upstream is down)
    resolver 127.0.0.11 ipv6=off valid=30s;

    location / { try_files $uri $uri/ /index.html; add_header Cache-Control "no-cache"; }
    location ~* \.(js|css|ico|woff2?)$ { expires 1y; add_header Cache-Control "public,immutable"; }

    # SIM bots
    location /s1/ {
        set $up_s1 "sim1:8000";
        rewrite ^/s1/(.*) /$1 break;
        proxy_pass http://$up_s1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /s2/ {
        set $up_s2 "sim2:8000";
        rewrite ^/s2/(.*) /$1 break;
        proxy_pass http://$up_s2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # REAL bots
    location /r1/ {
        set $up_r1 "real1:8000";
        rewrite ^/r1/(.*) /$1 break;
        proxy_pass http://$up_r1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /r2/ {
        set $up_r2 "real2:8000";
        rewrite ^/r2/(.*) /$1 break;
        proxy_pass http://$up_r2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Full names (compatibility)
    location /sim1/ {
        set $up_sim1 "sim1:8000";
        rewrite ^/sim1/(.*) /$1 break;
        proxy_pass http://$up_sim1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /sim2/ {
        set $up_sim2 "sim2:8000";
        rewrite ^/sim2/(.*) /$1 break;
        proxy_pass http://$up_sim2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /real1/ {
        set $up_real1 "real1:8000";
        rewrite ^/real1/(.*) /$1 break;
        proxy_pass http://$up_real1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /real2/ {
        set $up_real2 "real2:8000";
        rewrite ^/real2/(.*) /$1 break;
        proxy_pass http://$up_real2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
