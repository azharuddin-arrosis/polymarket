server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Docker embedded DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 ipv6=off valid=30s;

    location / { try_files $uri $uri/ /index.html; add_header Cache-Control "no-cache"; }
    location ~* \.(js|css|ico|woff2?)$ { expires 1y; add_header Cache-Control "public,immutable"; }

    # SIM bots - using resolver for runtime DNS resolution
    location /s1/ {
        proxy_pass http://sim1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /s2/ {
        proxy_pass http://sim2:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /s3/ {
        proxy_pass http://sim3:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    
    # REAL bots - menggunakan variable supaya bisa resolve saat runtime
    location /r1/ {
        set $upstream real1:8000;
        proxy_pass http://$upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /r2/ {
        set $upstream real2:8000;
        proxy_pass http://$upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Full names (kept for compatibility)
    location /sim1/ {
        proxy_pass http://sim1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /sim2/ {
        proxy_pass http://sim2:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /sim3/ {
        proxy_pass http://sim3:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /real1/ {
        set $upstream real1:8000;
        proxy_pass http://$upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location /real2/ {
        set $upstream real2:8000;
        proxy_pass http://$upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
